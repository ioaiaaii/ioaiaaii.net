version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # Keeps the SHA-pinned actions current (Dependabot bumps the SHA + version comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
