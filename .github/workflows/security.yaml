name: Security Scan

# Trivy filesystem scan — the security check from the old ci.yaml, adapted for the
# static stack: web/package-lock.json for vulnerable dependencies, the repo for
# committed secrets, and the deploy/iac Terraform for misconfiguration.
on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Weekly (Mon 06:00 UTC): re-scan unchanged deps so newly-disclosed CVEs surface.
    - cron: '0 6 * * 1'

# Least privilege: only read the repo.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      # The useful half of the old cache.yaml: cache Trivy's vulnerability DB so the
      # scan doesn't re-download it every run. Date-keyed → refreshes at most daily.
      - name: Trivy DB cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Trivy scan (deps, secrets, IaC misconfig, licenses)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig,license
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '1'
          format: table
          # Accepted findings (legacy-GCP misconfig, a build-only MPL-2.0 dep) are
          # documented in .trivyignore, which Trivy auto-loads from the repo root.
          trivyignores: .trivyignore
