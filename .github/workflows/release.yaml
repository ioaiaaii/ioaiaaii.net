name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags starting with 'v'

# Default to read-only; the release-notes job elevates to contents: write.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Production delivery: verify the tagged tree and deploy to the Cloudflare Pages
  # production branch. Only tags reach production.
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: make website-install
      - run: make website-lint-ci
      - run: make website-test
      - run: make website-build

      - name: Deploy to Cloudflare Pages (production)
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=ioaiaaii-net --branch=production

  # Only cut the GitHub Release once production is live — never announce a version
  # that did not ship.
  release-notes:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0        # full history for the changelog
          submodules: true      # changelog.mk lives in the repo-operator submodule

      - name: Generate changelog for the tag
        id: generate_changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          changelog=$(make conventional-changelog-release TAG=$TAG)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CHANGELOG: ${{ steps.generate_changelog.outputs.changelog }}
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const changelog = process.env.CHANGELOG;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `${tag}`,
              body: changelog,
              draft: false,
              prerelease: false,
            });
